<section class="page-header"><h1>Collections</h1><p>Chaque collection raconte une histoire.</p></section>
<div class="works-asymmetric" id="collectionsGrid" style="max-width:1440px;margin:0 auto;padding:0 48px 120px"></div>
<footer class="footer">
  <div class="footer-bottom">

    <p class="footer-disclaimer">All images on this site are AI-generated for conceptual reference only. No copyright infringement intended. · 本站所有图片均由AI生成，仅作概念参考，无意侵犯任何版权。</p>
  </div>
</footer>
<script src="js/main.js"></script>
<script>
(() => {
  const $ = s => document.querySelector(s);
  const lang = () => localStorage.getItem('altesse_lang') || 'en';
  async function load() {
    try {
      const [cols, works] = await Promise.all([fetch('/api/collections').then(r=>r.json()), fetch('/api/works').then(r=>r.json())]);
      const l = lang();
      $('#collectionsGrid').innerHTML = cols.filter(c=>c.active!==false).map(c => {
        const name = l==='zh' && c.nameZh ? c.nameZh : c.name;
        const desc = l==='zh' && c.descriptionZh ? c.descriptionZh : c.description;
        const colWorks = works.filter(w=>w.collection===c.id).slice(0,3);
        return `<a href="atelier.html?id=${c.id}" class="work-item" style="aspect-ratio:3/4">
          <img src="${c.coverImage}" alt="${name}" loading="lazy">
          <div class="work-item-info"><h3>${name}</h3><p>${colWorks.length} pieces</p></div></a>`;
      }).join('') || '<p style="text-align:center;padding:80px;color:var(--text-dim)">No collections found.</p>';
    } catch(e) { $('#collectionsGrid').innerHTML = '<p style="text-align:center;padding:80px;color:var(--text-dim)">Unable to load.</p>'; }
  }
  document.addEventListener('DOMContentLoaded', load);
})();
</script>
</body>
</html>
